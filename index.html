# Animated HTML Website Example

Save this as `index.html` and open it in your browser 🌌

```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Site</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    .btn {
      padding: 15px 35px;
      border: none;
      border-radius: 50px;
      background: #38bdf8;
      color: black;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
      animation: pulse 2s infinite;
    }

    .btn:hover {
      transform: scale(1.1);
      background: white;
    }

    .circle {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      animation: move 10s linear infinite;
    }

    .circle:nth-child(1) {
      top: 10%;
      left: 10%;
    }

    .circle:nth-child(2) {
      bottom: 10%;
      right: 10%;
      animation-duration: 14s;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-15px);
      }
      100% {
        transform: translateY(0px);
      }
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0px #38bdf8;
      }
      50% {
        box-shadow: 0 0 25px #38bdf8;
      }
      100% {
        box-shadow: 0 0 0px #38bdf8;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes move {
      0% {
        transform: translateY(0px) rotate(0deg);
      }
      50% {
        transform: translateY(-40px) rotate(180deg);
      }
      100% {
        transform: translateY(0px) rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div class="circle"></div>
  <div class="circle"></div>

  <div class="container">
    <h1>Welcome 🚀</h1>
    <p>A rough animated HTML + CSS website.</p>
    <button class="btn">Explore</button>
  </div>

</body>
</html>
```
