<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClaudeConnection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ink:        #0a0a0f;
      --paper:      #f5f0e8;
      --accent:     #e8460a;
      --accent-alt: #f5c842;
      --dim:        rgba(10,10,15,0.55);
      --serif:      'Playfair Display', Georgia, serif;
      --mono:       'JetBrains Mono', 'Courier New', monospace;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--mono);
      cursor: none;
    }

    /* ── Custom cursor ───────────────────────── */
    #cursor {
      position: fixed; top: 0; left: 0; z-index: 9999;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.08s, width 0.2s, height 0.2s, background 0.2s;
      mix-blend-mode: difference;
    }
    #cursor.grow {
      width: 48px; height: 48px;
      background: var(--accent-alt);
    }

    /* ── Canvas background ───────────────────── */
    #bg {
      position: fixed; inset: 0; z-index: 0;
    }

    /* ── Grain overlay ───────────────────────── */
    .grain {
      position: fixed; inset: -50%; z-index: 1;
      width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      animation: grain 0.4s steps(1) infinite;
    }
    @keyframes grain {
      0%,100%{transform:translate(0,0)}
      10%{transform:translate(-2%,-3%)}
      20%{transform:translate(3%,1%)}
      30%{transform:translate(-1%,4%)}
      40%{transform:translate(2%,-2%)}
      50%{transform:translate(-3%,3%)}
      60%{transform:translate(1%,-1%)}
      70%{transform:translate(-2%,2%)}
      80%{transform:translate(3%,-3%)}
      90%{transform:translate(-1%,1%)}
    }

    /* ── Layout ──────────────────────────────── */
    .stage {
      position: relative; z-index: 10;
      width: 100vw; height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: clamp(24px, 5vw, 60px);
    }

    /* ── Header ──────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      opacity: 0;
      animation: slideDown 0.8s 0.2s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .logo {
      font-family: var(--mono);
      font-size: clamp(0.65rem, 1.2vw, 0.8rem);
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--paper);
      opacity: 0.5;
    }
    nav {
      display: flex; gap: 2rem;
    }
    nav a {
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--paper);
      opacity: 0.4;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    nav a:hover { opacity: 1; }

    /* ── Hero ────────────────────────────────── */
    .hero {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 2rem;
    }
    .eyebrow {
      font-family: var(--mono);
      font-size: clamp(0.6rem, 1vw, 0.72rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    h1 {
      font-family: var(--serif);
      font-size: clamp(3.5rem, 10vw, 9rem);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -0.02em;
      max-width: 14ch;
    }
    h1 .line {
      display: block;
      overflow: hidden;
    }
    h1 .line span {
      display: block;
      opacity: 0;
      transform: translateY(110%);
    }
    h1 .line:nth-child(1) span { animation: lineUp 0.9s 0.6s cubic-bezier(0.22,1,0.36,1) forwards; }
    h1 .line:nth-child(2) span { animation: lineUp 0.9s 0.75s cubic-bezier(0.22,1,0.36,1) forwards; }
    h1 .line:nth-child(3) span { animation: lineUp 0.9s 0.9s cubic-bezier(0.22,1,0.36,1) forwards; }

    h1 em {
      font-style: italic;
      color: var(--accent-alt);
    }

    .sub {
      margin-top: 2.5rem;
      font-family: var(--mono);
      font-size: clamp(0.75rem, 1.3vw, 0.9rem);
      font-weight: 300;
      line-height: 1.8;
      color: var(--paper);
      opacity: 0;
      max-width: 40ch;
      animation: fadeUp 0.8s 1.1s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    .actions {
      margin-top: 3rem;
      display: flex; gap: 1.2rem; align-items: center;
      opacity: 0;
      animation: fadeUp 0.8s 1.3s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 0.6rem;
      padding: 1rem 2.2rem;
      background: var(--accent);
      color: var(--paper);
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      border: none; cursor: none;
      position: relative; overflow: hidden;
      transition: color 0.3s;
    }
    .btn-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--ink);
      transform: translateX(-101%);
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    }
    .btn-primary:hover::before { transform: translateX(0); }
    .btn-primary:hover { color: var(--paper); }
    .btn-primary span { position: relative; z-index: 1; }

    .btn-ghost {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--paper);
      opacity: 0.4;
      text-decoration: none;
      border: none; background: none; cursor: none;
      display: inline-flex; align-items: center; gap: 0.4rem;
      transition: opacity 0.2s;
    }
    .btn-ghost:hover { opacity: 0.9; }
    .arrow { display: inline-block; transition: transform 0.2s; }
    .btn-ghost:hover .arrow { transform: translateX(4px); }

    /* ── Footer strip ────────────────────────── */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      opacity: 0;
      animation: fadeUp 0.7s 1.5s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .ticker {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--paper);
      opacity: 0.25;
    }
    .status {
      display: flex; align-items: center; gap: 0.5rem;
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--paper);
      opacity: 0.35;
    }
    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3ecf5a;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100%{opacity:1} 50%{opacity:0.3}
    }

    /* ── Decorative ruled line ───────────────── */
    .rule {
      position: fixed;
      top: 0; bottom: 0;
      right: clamp(80px, 12vw, 180px);
      width: 1px;
      background: linear-gradient(to bottom, transparent, rgba(245,240,232,0.08) 30%, rgba(245,240,232,0.08) 70%, transparent);
      z-index: 5;
    }

    /* ── Scroll counter ──────────────────────── */
    .counter {
      position: fixed;
      right: clamp(24px, 3vw, 44px);
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      writing-mode: vertical-rl;
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--paper);
      opacity: 0.2;
    }

    /* ── Keyframes ───────────────────────────── */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 0.85; transform: translateY(0); }
    }
    @keyframes lineUp {
      from { opacity: 0; transform: translateY(110%); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 600px) {
      nav { display: none; }
      .rule, .counter { display: none; }
    }
  </style>
</head>
<body>

  <div id="cursor"></div>
  <div class="grain"></div>
  <canvas id="bg"></canvas>
  <div class="rule"></div>

  <div class="counter" id="time">— 00:00</div>

  <div class="stage">
    <header>
      <div class="logo">ClaudeConnection</div>
      <nav>
        <a href="#">Work</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
      </nav>
    </header>

    <main class="hero">
      <div class="eyebrow">✦ Intelligence, Refined</div>
      <h1>
        <div class="line"><span>Where</span></div>
        <div class="line"><span><em>Ideas</em> Meet</span></div>
        <div class="line"><span>Claude.</span></div>
      </h1>
      <p class="sub">
        A refined interface for exploring the edges of AI creativity —
        crafted for thinkers, builders, and the beautifully restless.
      </p>
      <div class="actions">
        <button class="btn-primary"><span>Begin Exploring</span></button>
        <a href="#" class="btn-ghost">View the work <span class="arrow">→</span></a>
      </div>
    </main>

    <footer>
      <div class="ticker" id="ticker">© 2026 ClaudeConnection</div>
      <div class="status">
        <div class="dot"></div>
        System Operational
      </div>
    </footer>
  </div>

  <script>
    /* ── Custom cursor ─────────────────────── */
    const cur = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cur.style.left = e.clientX + 'px';
      cur.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('a,button').forEach(el => {
      el.addEventListener('mouseenter', () => cur.classList.add('grow'));
      el.addEventListener('mouseleave', () => cur.classList.remove('grow'));
    });

    /* ── Live clock ────────────────────────── */
    const timeEl = document.getElementById('time');
    function tick() {
      const d = new Date();
      const h = String(d.getHours()).padStart(2,'0');
      const m = String(d.getMinutes()).padStart(2,'0');
      timeEl.textContent = `— ${h}:${m}`;
    }
    tick(); setInterval(tick, 10000);

    /* ── Particle canvas ───────────────────── */
    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const PARTICLE_COUNT = 55;
    const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
      x:   Math.random() * window.innerWidth,
      y:   Math.random() * window.innerHeight,
      r:   Math.random() * 1.4 + 0.3,
      vx:  (Math.random() - 0.5) * 0.25,
      vy:  (Math.random() - 0.5) * 0.25,
      o:   Math.random() * 0.35 + 0.05,
    }));

    let mouse = { x: -9999, y: -9999 };
    document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    function draw() {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      /* Radial glow near cursor */
      const grd = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 320);
      grd.addColorStop(0,   'rgba(232,70,10,0.06)');
      grd.addColorStop(0.5, 'rgba(245,200,66,0.03)');
      grd.addColorStop(1,   'transparent');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);

      /* Particles + connections */
      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W;
        if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H;
        if (p.y > H) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(245,240,232,${p.o})`;
        ctx.fill();
      });

      /* Draw thin connecting lines */
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const d  = Math.sqrt(dx*dx + dy*dy);
          if (d < 130) {
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = `rgba(245,240,232,${0.07 * (1 - d/130)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
